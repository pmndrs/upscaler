<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>03 · Split compare</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                background: #0b0d10;
                font: 12px/1.5 ui-monospace, Menlo, monospace;
                color: #cfd8e3;
            }
            canvas {
                display: block;
            }
            .label {
                position: fixed;
                top: 12px;
                padding: 6px 10px;
                background: rgba(8, 10, 14, 0.82);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 7px;
                pointer-events: none;
            }
            #labFsr {
                left: 12px;
                color: #7dd3fc;
            }
            #labNative {
                right: 12px;
            }
            #hint {
                position: fixed;
                left: 50%;
                bottom: 14px;
                transform: translateX(-50%);
                color: #8592a3;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="label" id="labFsr">◄ FSR3 (upscaled)</div>
        <div class="label" id="labNative">native ►</div>
        <div id="hint">move the mouse to wipe · left renders at a fraction of the pixels</div>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
