name: Publish to npm

# Publishes @pmndrs/upscaler on push to main. Two paths:
#
#   A. Manual / prerelease — if package.json already names a version npm doesn't
#      have (you ran `npm version …` yourself), publish that as-is. Prereleases
#      (0.2.0-beta.1) route to their own dist-tag so they never touch `latest`.
#
#   B. Auto-bump — otherwise, derive the next version from Conventional Commit
#      messages since the last tag (feat→minor, fix/perf→patch, breaking→major
#      capped to minor while 0.x; docs/chore/ci/etc → no release), then bump,
#      publish, and push the release commit + tag back with [skip ci].
#
# So: just push. feat/fix commits ship a release; everything else is a no-op.
# `npm publish` runs the package's prepublishOnly gate (lint/typecheck/test/
# build) first, so a broken tree can't ship.
#
# Auth is npm Trusted Publishing (OIDC) — no token/secret; provenance is
# attached automatically. One-time npm setup: publish once so the package
# exists, then register the trusted publisher (org pmndrs, repo upscaler,
# workflow publish.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the auto-bump release commit + tag
  id-token: write # OIDC trusted publishing + provenance

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, for the version computation
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing needs npm >= 11.5.1; Node 22 bundles npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci

      - name: Is package.json's version already on npm?
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "on_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_npm=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Path A: manual / prerelease version already set ---------------------
      - name: Publish (manual version)
        if: steps.check.outputs.on_npm == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"; TAG="${TAG%%.*}"          # 0.2.0-beta.1 → beta
            [[ "$TAG" =~ ^[0-9]+$ ]] && TAG="next"         # 0.2.0-0 (no preid) → next
          else
            TAG="latest"
          fi
          echo "Publishing $VERSION under dist-tag '$TAG'"
          npm publish --access public --tag "$TAG"

      # --- Path B: auto-bump from Conventional Commits -------------------------
      - name: Compute next version
        if: steps.check.outputs.on_npm == 'true'
        id: next
        run: echo "version=$(node scripts/release-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Publish (auto-bump)
        if: steps.check.outputs.on_npm == 'true' && steps.next.outputs.version != 'none'
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          NAME=$(node -p "require('./package.json').name")
          # Guard: if a prior run published this but failed to push its tag, just
          # (re)create + push the tag instead of a doomed republish.
          if npm view "$NAME@$NEXT" version >/dev/null 2>&1; then
            echo "$NAME@$NEXT already on npm — tagging only."
            git tag "v$NEXT" || true
            git push origin "v$NEXT" || true
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Auto-releasing v$NEXT"
          npm version "$NEXT" -m "release: v%s [skip ci]"
          npm publish --access public
          git push origin HEAD:main --follow-tags
