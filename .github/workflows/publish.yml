name: Publish to npm

# Publishes @pmndrs/upscaler on push to main — but ONLY when package.json's
# version is one npm doesn't already have. So day-to-day commits are a no-op;
# to cut a release, bump the version (npm version patch/minor/major) and merge.
# `npm publish` runs the package's own prepublishOnly gate (lint + typecheck +
# test + build), so a broken tree can't ship.
#
# Auth is npm Trusted Publishing (OIDC) — NO token/secret. GitHub Actions
# authenticates to npm over OpenID Connect. One-time setup on npm:
#   1. Publish 0.1.0 once locally (`npm publish`) so the package exists.
#   2. npmjs.com → the package → Settings → Trusted Publisher → GitHub Actions:
#      organization "pmndrs", repository "upscaler", workflow "publish.yml".
# After that this workflow publishes tokenless, with provenance, on every bump.

on:
  push:
    branches: [main]
  workflow_dispatch:

# id-token: write is what lets OIDC trusted publishing (and provenance) work.
permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted Publishing needs npm >= 11.5.1; Node 22 bundles npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci

      - name: Is this version already on npm?
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Already published: $NAME@$VERSION — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version: $NAME@$VERSION — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # No NODE_AUTH_TOKEN: OIDC trusted publishing handles auth + provenance.
      # prepublishOnly (lint/typecheck/test/build) runs automatically here.
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public
