name: Deploy examples to Pages

# Builds the interactive examples gallery and publishes it to GitHub Pages.
# The library is consumed straight from ../src via the examples vite alias, so
# no separate library build is needed here. PAGES_BASE makes asset URLs resolve
# under the project-site subpath (https://pmndrs.github.io/upscaler/).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for a Pages deploy from GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build gallery
        run: npm run examples:build
        env:
          PAGES_BASE: /upscaler/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
